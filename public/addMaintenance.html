<!DOCTYPE html>
<html>

<head>

<title>Add Maintenance</title>

<link rel="stylesheet" href="/css/style.css">

</head>

<body>

<div class="container">

<div class="card">

<h1>🛠 Add Maintenance Record</h1>

<form action="/addMaintenance" method="POST">

<input
type="number"
name="vehicle_id"
placeholder="Vehicle ID"
required>

<input
type="text"
name="service_type"
placeholder="Service Type"
required>

<input
type="date"
name="service_date"
required>

<input
type="number"
step="0.01"
name="cost"
placeholder="Cost"
required>

<textarea
name="notes"
placeholder="Notes"></textarea>

<button type="submit">
Save Maintenance
</button>

</form>

<br>

<a href="/dashboard">
⬅ Back to Dashboard
</a>

</div>

</div>

</body>

</html>
